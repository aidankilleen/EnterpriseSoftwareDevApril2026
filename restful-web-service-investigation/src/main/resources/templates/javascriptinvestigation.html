<!-- Modal -->
<div class="modal fade" id="dlgUser" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Add User</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Name:<input id="txtDlgName"><br>
                Email:<input id="txtDlgEmail"><br>
                Active: <input type="checkbox" id="chkDlgActive"><br>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="onSaveDialog()">Save</button>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: main-scripts}"/>

<script>

    let tooltipElements = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    const tooltipList = [...tooltipElements].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
    // manually configure the tooltip on
    btnAddUser = document.getElementById("btnAddUser");
    tt = new bootstrap.Tooltip(btnAddUser);
</script>

<script>
    let tbody = document.querySelector("#tblUsers tbody");
    let url = "/api/users";
    let allUsers = [];

    function onSaveDialog() {
        let name = document.getElementById("txtDlgName").value;
        let email = document.getElementById("txtDlgEmail").value;
        let active = document.getElementById("chkDlgActive").checked;

        let newUser = {
            name: name,
            email: email,
            active: active
        }
        fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(newUser)
        })
        .then(response => response.json())
        .then(user => {
            addUserToTable(user);

            let dlg = document.getElementById("dlgUser");
            bootstrap.Modal.getInstance(dlg).hide();

        });
    }
    // read the users from the api
    function addUserToTable(user) {
        let html = `<tr id="tr_${user.id}">
                                    <td>${user.id}</td>
                                    <td>${user.name}</td>
                                    <td>${user.email}</td>
                                    <td>${user.active ? "Active" : "Inactive"}</td>
                                    <td><button
                                        id="btnDelete_${user.id}"
                                        class="btn btn-danger btn-sm"
                                        onclick="deleteUser(${user.id})"
                                        ><i class="bi bi-trash"></i></i></button>
                                        <button
                                        id="btnEdit_${user.id}"
                                        class="btn btn-primary btn-sm"
                                        onclick="editUser(${user.id})"
                                        ><i class="bi bi-pencil-square"></i></button>
                                        <button
                                        id="btnSave_${user.id}"
                                        class="btn btn-success btn-sm"
                                        onclick="saveUser(${user.id})"
                                        disabled
                                        ><i class="bi bi-floppy"></i></button>
                                        <button
                                        id="btnCancel_${user.id}"
                                        class="btn btn-secondary btn-sm"
                                        onclick="cancelSaveUser(${user.id})"
                                        disabled
                                        ><i class="bi bi-x-circle"></i></button>
                                        </td>
                                   </tr>`;
        tbody.innerHTML += html;
    }

    function configureButtons(id, editing) {
        document.getElementById(`btnDelete_${id}`).disabled = editing;
        document.getElementById(`btnEdit_${id}`).disabled = editing;
        document.getElementById(`btnSave_${id}`).disabled = !editing;
        document.getElementById(`btnCancel_${id}`).disabled = !editing;
    }

    function saveUser(id) {

        let txtName = document.getElementById(`txtName_${id}`);
        let txtEmail = document.getElementById(`txtEmail_${id}`);
        let chkActive = document.getElementById(`chkActive_${id}`);

        let updatedUser = {
            id: id,
            name: txtName.value,
            email: txtEmail.value,
            active: chkActive.checked
        }
        fetch(`${url}/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(updatedUser)
        })
            .then(response=>{
                if (response.ok) {
                    document.querySelector(`#tr_${id} td:nth-child(2)`).innerHTML = updatedUser.name;
                    document.querySelector(`#tr_${id} td:nth-child(3)`).innerHTML = updatedUser.email;
                    document.querySelector(`#tr_${id} td:nth-child(4)`).innerHTML = updatedUser.active ? "Active" : "Inactive";

                    configureButtons(id, false);

                }
            });
    }
    function cancelSaveUser(id) {

        let txtName = document.getElementById(`txtName_${id}`);
        let originalName = txtName.getAttribute("data-original-value");
        document.querySelector(`#tr_${id} td:nth-child(2)`).innerHTML = originalName;

        let txtEmail = document.getElementById(`txtEmail_${id}`);
        let originalEmail = txtEmail.getAttribute("data-original-value");
        document.querySelector(`#tr_${id} td:nth-child(3)`).innerHTML = originalEmail;

        let chkActive = document.getElementById(`chkActive_${id}`);
        let originalActive = chkActive.getAttribute("data-original-value");
        document.querySelector(`#tr_${id} td:nth-child(4)`).innerHTML = originalActive == "true" ? "Active" : "Inactive";

        configureButtons(id, false);
    }
    function deleteUser(id) {
        if (confirm(`Are you sure you want to delete user ${id}`)) {
            fetch(`${url}/${id}`, {
                method: "DELETE"
            })
                .then(response => {
                    if (response.ok) {
                        tr = document.getElementById(`tr_${id}`);
                        tr.remove();
                    }
                });
        }
    }
    function addUsersToTable(users) {

        // clear the table before adding
        tbody.innerHTML = "";
        users.forEach(user => addUserToTable(user));
    }

    function editUser(id) {
        let tdName = document.querySelector(`#tr_${id} td:nth-child(2)`);
        let name = tdName.innerHTML;
        tdName.innerHTML=`<input value='${name}' id="txtName_${id}" data-original-value="${name}">`;

        let tdEmail = document.querySelector(`#tr_${id} td:nth-child(3)`);
        let email = tdEmail.innerHTML;
        tdEmail.innerHTML=`<input value='${email}' id="txtEmail_${id}" data-original-value="${email}">`;

        let tdActive = document.querySelector(`#tr_${id} td:nth-child(4)`);
        let active = tdActive.innerHTML == "Active";
        tdActive.innerHTML=`<input type="checkbox" ${ active ? "checked" : "" } id="chkActive_${id}" data-original-value="${active}">`;

        // enable / disable buttons
        configureButtons(id, true);

        //document.getElementById(`btnDelete_${id}`).disabled = true;
        //document.getElementById(`btnEdit_${id}`).disabled = true;
        //document.getElementById(`btnSave_${id}`).disabled = false;
        //document.getElementById(`btnCancel_${id}`).disabled = false;

    }
    function onFetchUsers() {
        //alert("fetch users");
        fetch(url)
            .then(response => {
                console.log(response);
                return response.json();
            })
            .then(users => {
                allUsers = users;
                console.log(users);
                addUsersToTable(users);
            });
    }

    // initialisation code can be put at the end of the <script> tag
    onFetchUsers();

</script>



</body>
</html>
